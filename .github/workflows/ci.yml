name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prisma-migrations-in-sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Fails (exit 2) if schema.prisma has changes not captured in prisma/migrations/.
      # If this fires: run `npx prisma migrate dev --name <desc>` locally and commit the new migration.
      - name: Verify migrations match schema.prisma
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://x:x@localhost/x
      - run: npx tsc --noEmit

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: postgresql://x:x@localhost/x
          NEXTAUTH_SECRET: ci-secret-placeholder
          NEXTAUTH_URL: http://localhost:3000
